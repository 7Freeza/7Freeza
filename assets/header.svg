<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="200" viewBox="0 0 1200 200" role="img" aria-label="Sebastian Ropain">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="45%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#21262d"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#58a6ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#8b949e" stroke-width="0.5" opacity="0.12"/>
    </pattern>
  </defs>

  <rect width="1200" height="200" fill="url(#bg)"/>
  <rect width="1200" height="200" fill="url(#grid)"/>

  <g opacity="0.35">
    <circle cx="180" cy="60" r="2" fill="#58a6ff">
      <animate attributeName="cy" values="60;140;60" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="420" cy="120" r="1.5" fill="#8b949e">
      <animate attributeName="cx" values="420;980;420" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="760" cy="80" r="2" fill="#58a6ff">
      <animate attributeName="cy" values="80;160;80" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1020" cy="140" r="1.5" fill="#8b949e">
      <animate attributeName="cx" values="1020;200;1020" dur="11s" repeatCount="indefinite"/>
    </circle>
  </g>

  <rect y="0" width="280" height="200" fill="url(#shine)">
    <animate attributeName="x" values="-280;1200;-280" dur="6s" repeatCount="indefinite"/>
  </rect>

  <line x1="120" y1="170" x2="1080" y2="170" stroke="#30363d" stroke-width="1"/>
  <line x1="120" y1="170" x2="320" y2="170" stroke="#58a6ff" stroke-width="2" stroke-linecap="round" opacity="0.7">
    <animate attributeName="x1" values="120;900;120" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="320;1080;320" dur="4.5s" repeatCount="indefinite"/>
  </line>

  <text x="600" y="92" text-anchor="middle" font-family="Segoe UI, system-ui, -apple-system, sans-serif" font-size="44" font-weight="600" fill="#e6edf3" letter-spacing="1">Sebastian Ropain</text>
  <text x="600" y="128" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" fill="#8b949e">Full Stack Developer in Training</text>
</svg>