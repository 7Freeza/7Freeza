<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="160" viewBox="0 0 1200 160" role="img" aria-label="Sebastian Ropain">
  <!-- Minimal header — solid fills only (GitHub-safe) -->
  <rect width="1200" height="160" fill="#0d1117"/>

  <!-- Name -->
  <text
    x="600"
    y="78"
    text-anchor="middle"
    font-family="Segoe UI, Helvetica, Arial, sans-serif"
    font-size="38"
    font-weight="500"
    fill="#e6edf3"
    letter-spacing="2"
  >Sebastian Ropain</text>

  <!-- Thin line under name -->
  <line x1="420" y1="100" x2="780" y2="100" stroke="#30363d" stroke-width="1"/>

  <!-- Quiet moving accent on the line -->
  <rect y="99" width="40" height="2" fill="#8b949e">
    <animate attributeName="x" values="420;740;420" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;1;0.4" dur="7s" repeatCount="indefinite"/>
  </rect>

  <!-- Role -->
  <text
    x="600"
    y="128"
    text-anchor="middle"
    font-family="Segoe UI, Helvetica, Arial, sans-serif"
    font-size="14"
    font-weight="400"
    fill="#8b949e"
    letter-spacing="3"
  >Full Stack Developer</text>
</svg>
